name: Deploy Shopify theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shopify-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Theme Check and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      SHOPIFY_CLI_NO_ANALYTICS: 1
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_FLAG_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}

    steps:
      - name: Check out theme
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest @shopify/theme@latest

      - name: Validate required deployment secrets
        shell: bash
        run: |
          missing=0
          for name in SHOPIFY_CLI_THEME_TOKEN SHOPIFY_FLAG_STORE SHOPIFY_FLAG_THEME_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Run Theme Check
        run: shopify theme check

      - name: Deploy theme to Shopify
        run: shopify theme push --path . --allow-live --strict --json --no-color
